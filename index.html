<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dashboard Akademik — Matkul</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FAF7F0;
  --paper-raised:#FFFFFF;
  --ink:#1B2B28;
  --ink-soft:#46554F;
  --line:#D8D0BE;
  --line-strong:#C2B89E;
  --forest:#2D5F5B;
  --forest-bg:#E2EEEA;
  --brick:#C44E3A;
  --brick-bg:#F7E2DC;
  --clay:#B9791E;
  --clay-bg:#FBEEDD;
  --amber:#A87D1F;
  --amber-bg:#FCF3DE;
  --slate:#6B7280;
  --slate-bg:#EEEFF1;
  --blue:#2C5F8A;
  --blue-bg:#E8F0F7;
  --purple:#7B2D8B;
  --purple-bg:#F5E8F7;
  --sidebar-w:270px;
  --topbar-h:56px;
  --radius:14px;
  --shadow-sm: 0 1px 2px rgba(27,43,40,0.06), 0 1px 1px rgba(27,43,40,0.04);
  --shadow-md: 0 4px 16px rgba(27,43,40,0.10), 0 1px 3px rgba(27,43,40,0.06);
  --shadow-lg: 0 12px 32px rgba(27,43,40,0.16), 0 2px 6px rgba(27,43,40,0.08);
}

*{box-sizing:border-box; margin:0; padding:0;}
html{-webkit-text-size-adjust:100%; scroll-behavior:smooth;}
body{
  background:var(--paper);
  background-image:
    repeating-linear-gradient(0deg,rgba(27,43,40,0.025) 0px,rgba(27,43,40,0.025) 1px,transparent 1px,transparent 32px),
    repeating-linear-gradient(90deg,rgba(27,43,40,0.025) 0px,rgba(27,43,40,0.025) 1px,transparent 1px,transparent 32px);
  color:var(--ink);
  font-family:'Inter',-apple-system,sans-serif;
  min-height:100vh;
  display:flex;
}
.mono{font-family:'JetBrains Mono',monospace;}
.display{font-family:'Space Grotesk',sans-serif;}

/* ============ SIDEBAR ============ */
.sidebar{
  position:fixed; top:0; left:0;
  width:var(--sidebar-w);
  height:100vh;
  background:var(--paper-raised);
  border-right:1.5px solid var(--ink);
  display:flex; flex-direction:column;
  z-index:50;
  overflow:hidden;
  transition:transform 0.28s cubic-bezier(.4,0,.2,1);
}
.sidebar-header{
  padding:16px 18px 12px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.sidebar-logo{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700; font-size:15px;
  display:flex; align-items:center; gap:8px;
  margin-bottom:4px;
}
.sidebar-logo-dot{
  width:9px; height:9px; border-radius:50%;
  background:var(--ink); flex-shrink:0;
}
.sidebar-sub{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px; color:var(--ink-soft);
  letter-spacing:0.06em; text-transform:uppercase;
}
.sidebar-section-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; text-transform:uppercase;
  letter-spacing:0.09em; color:var(--ink-soft);
  padding:12px 18px 5px;
  border-top:1px solid var(--line);
  flex-shrink:0;
}
/* Day sub-header inside sidebar */
.sidebar-day-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px; text-transform:uppercase;
  letter-spacing:0.1em; color:var(--ink-soft);
  padding:8px 18px 3px 18px;
  display:flex; align-items:center; gap:6px;
}
.sidebar-day-label::after{
  content:''; flex:1; height:1px; background:var(--line);
}
.sidebar-day-label.today-label{color:var(--forest);}
.sidebar-list{overflow-y:auto; flex:1;}
.sidebar-item{
  display:flex; align-items:center; gap:10px;
  padding:11px 18px;
  cursor:pointer;
  border-left:3px solid transparent;
  transition:all 0.14s ease;
  text-decoration:none;
}
.sidebar-item:hover{background:var(--slate-bg); border-left-color:var(--line-strong);}
.sidebar-item.active{background:var(--forest-bg); border-left-color:var(--forest);}
.sidebar-item.active .si-name{color:var(--forest);}
.si-icon{
  width:30px; height:30px; border-radius:8px;
  background:var(--slate-bg); color:var(--slate);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; font-size:13px; font-weight:700;
  font-family:'Space Grotesk',sans-serif;
}
.sidebar-item.active .si-icon{background:var(--forest-bg); color:var(--forest);}
.sidebar-item.type-fast .si-icon{background:var(--blue-bg); color:var(--blue);}
.sidebar-item.type-fast.active .si-icon{background:var(--forest-bg); color:var(--forest);}
/* Today's class highlight in sidebar */
.sidebar-item.today-class{border-left-color:var(--amber);}
.sidebar-item.today-class .si-icon{background:var(--amber-bg); color:var(--amber);}
.sidebar-item.today-class.active .si-icon{background:var(--forest-bg); color:var(--forest);}
.sidebar-item.today-class.active{border-left-color:var(--forest);}
.si-info{min-width:0; flex:1;}
.si-name{
  font-weight:600; font-size:13px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  color:var(--ink);
}
.si-meta{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px; color:var(--ink-soft);
  margin-top:1px;
}
.si-badge{
  font-family:'JetBrains Mono',monospace;
  font-size:10px; font-weight:600;
  padding:2px 6px; border-radius:5px;
  background:var(--brick-bg); color:var(--brick);
  flex-shrink:0;
}
.si-badge.zero{background:var(--slate-bg); color:var(--slate);}

/* ============ TOPBAR ============ */
.topbar{
  position:fixed; top:0;
  left:var(--sidebar-w); right:0;
  height:var(--topbar-h);
  background:var(--paper-raised);
  border-bottom:1.5px solid var(--ink);
  display:flex; align-items:center;
  padding:0 20px; gap:12px;
  z-index:40;
}
.topbar-hamburger{
  display:none;
  width:34px; height:34px;
  border:1.5px solid var(--line-strong); border-radius:8px;
  background:transparent; cursor:pointer;
  align-items:center; justify-content:center;
  flex-shrink:0;
}
.topbar-hamburger svg{width:18px; height:18px;}
.topbar-breadcrumb{
  font-family:'Space Grotesk',sans-serif;
  font-size:14px; font-weight:600;
  flex:1; min-width:0;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.topbar-breadcrumb span{color:var(--ink-soft); font-weight:500; margin:0 5px;}
.topbar-clock{
  font-family:'JetBrains Mono',monospace;
  font-size:13px; color:var(--ink-soft);
  flex-shrink:0;
}

/* ============ MAIN CONTENT ============ */
.main{
  margin-left:var(--sidebar-w);
  margin-top:var(--topbar-h);
  flex:1; min-width:0;
  padding:28px 24px 64px;
}

/* ============ VIEWS ============ */
.view{display:none;}
.view.active{display:block;}

/* ============ DASHBOARD: STATUS BAR ============ */
.dash-status-bar{
  display:flex; align-items:center; gap:10px;
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:12px 18px;
  margin-bottom:14px;
  box-shadow:var(--shadow-sm);
  flex-wrap:wrap;
}
.dsb-dot{
  width:8px; height:8px; border-radius:50%;
  background:var(--forest); flex-shrink:0;
  animation:pulse-green 2s ease-in-out infinite;
}
.dsb-dot.stale{background:var(--amber); animation:none;}
@keyframes pulse-green{0%,100%{opacity:1;}50%{opacity:0.4;}}
.dsb-text{
  font-family:'JetBrains Mono',monospace;
  font-size:11.5px; color:var(--ink-soft); flex:1;
}
.dsb-text strong{color:var(--ink);}
.dsb-btn{
  font-family:'Inter',sans-serif; font-weight:600; font-size:12px;
  padding:6px 12px; border-radius:8px;
  border:1.5px solid var(--line-strong);
  background:var(--paper); cursor:pointer;
  color:var(--ink);
  display:inline-flex; align-items:center; gap:5px;
  transition:all 0.14s ease; flex-shrink:0;
}
.dsb-btn:hover:not(:disabled){background:var(--slate-bg); border-color:var(--ink);}
.dsb-btn:disabled{opacity:0.5; cursor:not-allowed;}
.dsb-btn svg{width:13px; height:13px;}
.dsb-btn.spinning svg{animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ============ DASHBOARD GRID ============ */
.dash-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px; margin-bottom:28px;
}
.dash-card{
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px 18px;
  box-shadow:var(--shadow-sm);
}
.dc-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px; text-transform:uppercase;
  letter-spacing:0.06em; color:var(--ink-soft);
  margin-bottom:6px;
}
.dc-value{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700; font-size:30px; line-height:1;
}
.dc-value.c-forest{color:var(--forest);}
.dc-value.c-brick{color:var(--brick);}
.dc-value.c-blue{color:var(--blue);}
.dc-value-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px; color:var(--ink-soft);
  margin-top:3px; margin-bottom:12px;
}
.dc-sub{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;}
.dc-sub-num{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700; font-size:16px; color:var(--forest);
}
.dc-sub-text{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-soft);}
.dc-sub-divider{width:1px;height:16px;background:var(--line);flex-shrink:0;}

/* ============ SORT TOGGLE ============ */
.sort-toggle{
  display:inline-flex; align-items:center; gap:2px;
  background:var(--slate-bg); border:1px solid var(--line);
  border-radius:10px; padding:3px; flex-shrink:0;
}
.sort-toggle-btn{
  font-family:'Inter',sans-serif; font-weight:600; font-size:12px;
  padding:7px 13px; border-radius:7px; border:none;
  background:transparent; color:var(--ink-soft); cursor:pointer;
  display:inline-flex; align-items:center; gap:6px;
  transition:all 0.15s ease; white-space:nowrap;
}
.sort-toggle-btn svg{width:13px; height:13px; flex-shrink:0;}
.sort-toggle-btn.active{
  background:var(--paper-raised); color:var(--ink);
  box-shadow:var(--shadow-sm);
}
.sort-toggle-btn:hover:not(.active){color:var(--ink);}

/* ============ REKAP BY MATKUL (grouped) ============ */
.matkul-group-head{
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  margin-bottom:8px;
}
.matkul-group-name{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700; font-size:15px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  min-width:0;
}
.matkul-group-meta{
  display:flex; align-items:center; gap:10px;
  flex:1; min-width:120px;
}
.matkul-group-sched{
  font-family:'JetBrains Mono',monospace;
  font-size:11px; color:var(--ink-soft);
  white-space:nowrap; flex-shrink:0;
}
.matkul-group-count{
  font-family:'JetBrains Mono',monospace;
  font-size:11px; color:var(--ink-soft);
  flex-shrink:0; white-space:nowrap;
}

/* ============ REKAP WAKTU ============ */
.rekap-groups{display:flex; flex-direction:column; gap:14px;}
.rekap-group-head{
  display:flex; align-items:center; gap:10px;
  margin-bottom:8px;
}
.rekap-day-pill{
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:600;
  padding:3px 10px; border-radius:20px;
  text-transform:uppercase; letter-spacing:0.05em;
  flex-shrink:0;
}
.rdp-today{background:var(--forest); color:#fff;}
.rdp-tomorrow{background:var(--clay-bg); color:var(--clay);}
.rdp-week{background:var(--slate-bg); color:var(--slate);}
.rdp-next{background:var(--line); color:var(--ink-soft);}
.rekap-group-title{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700; font-size:15px;
}
.rekap-group-line{flex:1; height:1.5px; background:var(--line);}
.rekap-empty{
  font-size:13px; color:var(--ink-soft);
  padding:10px 0; font-style:italic;
}

/* ============ MOODLE-STYLE COURSE VIEW ============ */
.course-header{
  background:var(--paper-raised);
  border:1.5px solid var(--ink);
  border-radius:var(--radius);
  padding:20px 24px 18px;
  margin-bottom:22px;
  position:relative; overflow:hidden;
}
.course-header::before{
  content:"";
  position:absolute; left:0; top:0; bottom:0; width:6px;
  background:repeating-linear-gradient(180deg,var(--ink) 0,var(--ink) 8px,transparent 8px,transparent 16px);
}
.course-header-inner{padding-left:14px;}
.course-eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px; letter-spacing:0.09em;
  text-transform:uppercase; color:var(--ink-soft);
  margin-bottom:4px;
}
.course-title-main{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700; font-size:21px; margin-bottom:6px;
}
.course-meta-row{
  display:flex; gap:16px; flex-wrap:wrap;
}
.course-meta-item{
  font-family:'JetBrains Mono',monospace;
  font-size:12px; color:var(--ink-soft);
  display:flex; align-items:center; gap:5px;
}
.course-meta-item svg{width:13px; height:13px; flex-shrink:0;}
.course-meta-item a{color:var(--blue); text-decoration:none;}
.course-meta-item a:hover{text-decoration:underline;}

/* Week accordion */
.week-list{display:flex; flex-direction:column; gap:10px;}
.week-block{
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow-sm);
  scroll-margin-top:calc(var(--topbar-h) + 16px);
}
/* Week current / ongoing highlight */
.week-block.is-current-week{
  border-color:var(--forest);
  box-shadow:0 0 0 2px var(--forest-bg), var(--shadow-sm);
}
.week-block.is-ongoing{
  border-color:var(--clay);
  box-shadow:0 0 0 2px var(--clay-bg), var(--shadow-sm);
}
.week-header{
  display:flex; align-items:center; gap:12px;
  padding:14px 18px;
  cursor:pointer;
  transition:background 0.14s ease;
  user-select:none;
}
.week-header:hover{background:var(--slate-bg);}
.week-label{
  font-family:'Space Grotesk',sans-serif;
  font-weight:600; font-size:14px; flex:1;
}
.week-caret{
  width:18px; height:18px; flex-shrink:0;
  color:var(--ink-soft);
  transition:transform 0.2s ease;
}
.week-block.open .week-caret{transform:rotate(180deg);}
.week-body{
  border-top:1px solid var(--line);
  padding:16px 20px;
  display:none;
}
.week-block.open .week-body{display:block;}

/* Week badges */
.week-status-badge{
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px; font-weight:600;
  padding:2px 8px; border-radius:20px;
  text-transform:uppercase; letter-spacing:0.05em;
  flex-shrink:0;
}
.wsb-current{background:var(--forest-bg); color:var(--forest);}
.wsb-ongoing{background:#3B3F8C; color:#FFFFFF;}

/* Tipe pertemuan badge (TMV/DARING/LIBUR/UTS/UAS) — warna mengikuti kalender resmi */
.week-tipe-badge{
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px; font-weight:700;
  padding:2px 8px; border-radius:20px;
  text-transform:uppercase; letter-spacing:0.04em;
  flex-shrink:0;
}
.wt-TMV{background:var(--clay-bg); color:var(--clay);}
.wt-DARING{background:var(--blue-bg); color:var(--blue);}
.wt-LIBUR{background:var(--brick-bg); color:var(--brick);}
.wt-UTS{background:var(--forest-bg); color:var(--forest);}
.wt-UAS{background:#1C2A4D; color:#FFFFFF;}
.wt-TENANG{background:#EDEAF7; color:#5B4E9C;}
.week-pertemuan-no{
  font-family:'JetBrains Mono',monospace;
  font-size:11px; color:var(--ink-soft);
  flex-shrink:0; white-space:nowrap;
}

/* Pertemuan title */
.pertemuan-title{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700; font-size:14px;
  color:var(--forest); margin-bottom:6px;
}
.pertemuan-desc{
  font-size:13.5px; color:var(--ink-soft);
  margin-bottom:14px; line-height:1.6;
}

/* Activity items */
.activity-list{display:flex; flex-direction:column; gap:0;}
.activity-item{
  display:flex; align-items:center; gap:12px;
  padding:8px 10px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
  transition:background 0.12s ease;
  border-radius:6px;
  margin:0 -10px;
}
.activity-item:hover{background:var(--slate-bg);}
.activity-item:last-child{border-bottom:none;}
.ai-icon{
  width:32px; height:32px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.ai-icon.type-meet{background:#E8F5E9;}
.ai-icon.type-attend{background:#F3E5F5;}
.ai-icon.type-pdf{background:#FBE9E7;}
.ai-icon.type-forum{background:#E3F2FD;}
.ai-icon.type-quiz{background:#FFF8E1;}
.ai-icon.type-task, .ai-icon.type-tugas{background:#E8F0E9;}
.ai-icon svg{width:18px; height:18px;}
.ai-info{flex:1; min-width:0;}
.ai-name{
  font-size:13.5px; font-weight:500;
  color:var(--blue); cursor:pointer;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  text-decoration:none;
}
.ai-name:hover{text-decoration:underline;}
.ai-meta{
  font-family:'JetBrains Mono',monospace;
  font-size:11px; color:var(--ink-soft);
  margin-top:1px;
}

/* ============ SECTION HEADING ============ */
.section-head{
  display:flex; align-items:baseline; gap:10px;
  margin-bottom:14px; padding-bottom:8px;
  border-bottom:1.5px solid var(--ink);
}
.section-title{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700; font-size:17px;
}
.section-count{
  font-family:'JetBrains Mono',monospace;
  font-size:12px; color:var(--ink-soft);
  margin-left:auto;
}

/* ============ TASK CARDS ============ */
.task-list{display:flex; flex-direction:column; gap:10px;}
.task-card{
  position:relative; background:var(--paper-raised);
  border:1px solid var(--line); border-radius:var(--radius);
  padding:16px 18px 16px 20px; box-shadow:var(--shadow-sm);
  display:grid; grid-template-columns:1fr auto;
  gap:14px; align-items:center;
  transition:transform 0.15s ease,box-shadow 0.15s ease;
  animation:slideIn 0.3s ease backwards;
}
.task-card:hover{box-shadow:var(--shadow-md); transform:translateY(-1px);}
@keyframes slideIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.status-ladder{display:none;}
.task-main{min-width:0;}
.task-top-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px;}
.badge{
  font-family:'JetBrains Mono',monospace; font-size:10.5px;
  font-weight:600; text-transform:uppercase; letter-spacing:0.04em;
  padding:3px 8px; border-radius:6px;
}
.badge.type-tugas{background:var(--blue-bg);color:var(--blue);}
.badge.type-quiz{background:var(--clay-bg);color:var(--clay);}
.badge.type-forum{background:var(--forest-bg);color:var(--forest);}
.badge.status-late{background:var(--brick-bg);color:var(--brick);}
.badge.status-urgent{background:var(--clay-bg);color:var(--clay);}
.badge.status-soon{background:var(--amber-bg);color:var(--amber);}
.badge.status-safe{background:var(--forest-bg);color:var(--forest);}
.task-course{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;}
.task-schedule{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ink-soft);}
.task-title{font-size:13.5px;color:var(--ink-soft);margin-top:3px;}
.task-deadline-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px;}
.task-deadline{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);}
.task-countdown{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;}
.s-late .task-countdown{color:var(--brick);}
.s-urgent .task-countdown{color:var(--clay);}
.s-soon .task-countdown{color:var(--amber);}
.s-safe .task-countdown{color:var(--forest);}
.task-action{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.btn-open{
  font-family:'Inter',sans-serif; font-weight:600; font-size:13px;
  padding:9px 16px; border-radius:9px; border:1.5px solid var(--ink);
  background:var(--ink); color:var(--paper); cursor:pointer;

<script>
/* ============================================================
   DATA
============================================================ */
function isoIn(d,h=23,m=59){
  const dt=new Date(); dt.setDate(dt.getDate()+d); dt.setHours(h,m,0,0); return dt.toISOString();
}

// Build a "D Bulan – D Bulan" week-range label relative to today.
// weekOffset 0 = the Mon–Sun week containing today, -1 = previous week, 1 = next week, etc.
function weekLabelIn(weekOffset){
  const MONTHS=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const now=new Date();
  const day=now.getDay(); // 0=Minggu..6=Sabtu
  const diffToMonday=(day===0?-6:1-day); // shift so week starts Monday
  const monday=new Date(now); monday.setHours(0,0,0,0);
  monday.setDate(monday.getDate()+diffToMonday+weekOffset*7);
  const sunday=new Date(monday); sunday.setDate(sunday.getDate()+6);
  return `${monday.getDate()} ${MONTHS[monday.getMonth()]} – ${sunday.getDate()} ${MONTHS[sunday.getMonth()]}`;
}

// Day order for sorting (Senin=1 .. Minggu=7)
const DAY_ORDER = {Senin:1,Selasa:2,Rabu:3,Kamis:4,Jumat:5,Sabtu:6,Minggu:7};

let COURSES_META = {};
let COURSE_WEEKS = {};

function getCourseOrder(){
  return Object.keys(COURSES_META).sort((a,b)=>{
    const mA = COURSES_META[a];
    const mB = COURSES_META[b];
    const d1 = DAY_ORDER[mA.day] || 9;
    const d2 = DAY_ORDER[mB.day] || 9;
    if(d1 !== d2) return d1 - d2;
    return (mA.time || '').localeCompare(mB.time || '');
  });
}

// Clean course name utility matching Python logic
function cleanCourseNameJS(raw) {
  if (!raw) return '';
  const m = /\((\w+)\s+(\d{1,2}:\d{2})\)/.exec(raw);
  if (m) {
    const idx = raw.indexOf('(');
    const nama = toTitleCase(raw.slice(0, idx).trim());
    const hari = m[1];
    const jam = m[2];
    return `${nama} — ${hari} ${jam}`;
  }

  const parts = raw.split(' - ').map(p => p.trim());
  if (parts.length >= 3) {
    const nama = toTitleCase(parts[0]);
    const jadwal_raw = parts[2];
    const m2 = /(\w+)\s+(\d{1,2}:\d{2})/.exec(jadwal_raw);
    if (m2) {
      const hari = m2[1];
      const jam = m2[2];
      return `${nama} — ${hari} ${jam}`;
    }
    if (nama && nama.toLowerCase() !== "course name" && nama.toLowerCase() !== "nama kelas") {
      return nama;
    }
  }

  let fallback = toTitleCase(raw.trim()).slice(0, 60);
  if (fallback.toLowerCase() === "course name" || fallback.toLowerCase() === "nama kelas" || !fallback) {
    return raw.trim().slice(0, 60) || "(kelas tidak dikenal)";
  }
  return fallback;
}

function toTitleCase(str) {
  return str.toLowerCase().split(' ').map(word => {
    return word.charAt(0).toUpperCase() + word.slice(1);
  }).join(' ');
}

// Generate initials / abbreviations for courses
function getCourseAbbr(name) {
  const words = name.replace(/[^a-zA-Z0-9\s]/g, '').split(/\s+/).filter(w => w.length > 0);
  if (words.length === 0) return 'UN';
  if (words.length === 1) return words[0].slice(0, 2).toUpperCase();
  
  const firstWord = words[0].toLowerCase();
  if ((firstWord === 'praktikum' || firstWord === 'prak') && words.length > 2) {
    return (words[0][0] + words[2][0]).toUpperCase();
  }
  return (words[0][0] + (words[1] ? words[1][0] : '')).toUpperCase().slice(0, 2);
}

// Calculate typical class end time if not specified
function calculateEndTime(startTime) {
  if (!startTime || !startTime.includes(':')) return '';
  const [h, m] = startTime.split(':').map(Number);
  let eh = h + 2;
  let em = m + 30;
  if (em >= 60) {
    eh += 1;
    em -= 60;
  }
  eh = eh % 24;
  return `${String(eh).padStart(2, '0')}:${String(em).padStart(2, '0')}`;
}

// Generate semester weekly structure dynamically
function generateWeeksForCourse(courseId) {
  const c = COURSES_META[courseId];
  if (!c) return [];
  
  const dayOffsetMap = { 'Senin': 0, 'Selasa': 1, 'Rabu': 2, 'Kamis': 3, 'Jumat': 4, 'Sabtu': 5, 'Minggu': 6 };
  const day = c.day || 'Senin';
  const offset = dayOffsetMap[day] !== undefined ? dayOffsetMap[day] : 0;
  
  const MONTHS = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const baseSemesterStart = new Date(2026, 2, 9); // Mon, 9 March 2026
  
  const isWeekend = (day === 'Sabtu' || day === 'Minggu');
  
  const config = isWeekend ? [
    { pKe: 1, type: 'TMV', open: true },
    { pKe: null, type: 'LIBUR', open: false },
    { pKe: null, type: 'LIBUR', open: false },
    { pKe: 2, type: 'TMV', open: false },
    { pKe: 3, type: 'DARING', open: false },
    { pKe: 4, type: 'TMV', open: false },
    { pKe: 5, type: 'DARING', open: false },
    { pKe: 6, type: 'TMV', open: false },
    { pKe: 7, type: 'DARING', open: false },
    { pKe: null, type: 'TENANG', open: false },
    { pKe: 8, type: 'UTS', open: false },
    { pKe: 9, type: 'TMV', open: false },
    { pKe: 10, type: 'DARING', open: false },
    { pKe: 11, type: 'TMV', open: false },
    { pKe: 12, type: 'DARING', open: false },
    { pKe: 13, type: 'TMV', open: false },
    { pKe: 14, type: 'DARING', open: false },
    { pKe: 15, type: 'TMV', open: false },
    { pKe: null, type: 'TENANG', open: false },
    { pKe: 16, type: 'UAS', open: false }
  ] : [
    { pKe: 1, type: 'TMV', open: true },
    { pKe: null, type: 'LIBUR', open: false },
    { pKe: null, type: 'LIBUR', open: false },
    { pKe: 2, type: 'DARING', open: false },
    { pKe: 3, type: 'TMV', open: false },
    { pKe: 4, type: 'DARING', open: false },
    { pKe: 5, type: 'TMV', open: false },
    { pKe: 6, type: 'DARING', open: false },
    { pKe: 7, type: 'TMV', open: false },
    { pKe: null, type: 'TENANG', open: true },
    { pKe: 8, type: 'UTS', open: false },
    { pKe: 9, type: 'TMV', open: false },
    { pKe: 10, type: 'DARING', open: false },
    { pKe: 11, type: 'TMV', open: false },
    { pKe: 12, type: 'DARING', open: false },
    { pKe: 13, type: 'TMV', open: false },
    { pKe: 14, type: 'DARING', open: false },
    { pKe: 15, type: 'TMV', open: false },
    { pKe: null, type: 'TENANG', open: false },
    { pKe: 16, type: 'UAS', open: false }
  ];
  
  return config.map((w, idx) => {
    const weekMon = new Date(baseSemesterStart);
    weekMon.setDate(baseSemesterStart.getDate() + (idx * 7));
    
    const weekSun = new Date(weekMon);
    weekSun.setDate(weekMon.getDate() + 6);
    
    const classDate = new Date(weekMon);
    classDate.setDate(weekMon.getDate() + offset);
    
    let weekStr = '';
    let displayWeek = undefined;
    
    if (isWeekend) {
      if (w.type === 'UTS' || w.type === 'UAS' || w.type === 'TENANG') {
        weekStr = `${weekMon.getDate()} ${MONTHS[weekMon.getMonth()]} – ${weekSun.getDate()} ${MONTHS[weekSun.getMonth()]}`;
        displayWeek = `${classDate.getDate()} ${MONTHS[classDate.getMonth()]} ${classDate.getFullYear()}`;
      } else {
        weekStr = `${classDate.getDate()} ${MONTHS[classDate.getMonth()]} ${classDate.getFullYear()}`;
      }
    } else {
      weekStr = `${weekMon.getDate()} ${MONTHS[weekMon.getMonth()]} – ${weekSun.getDate()} ${MONTHS[weekSun.getMonth()]}`;
    }
    
    let pertLabel = '';
    let desc = '';
    if (w.pKe !== null) {
      pertLabel = `Pertemuan ${w.pKe}`;
    } else if (w.type === 'LIBUR') {
      pertLabel = 'Libur';
    } else if (w.type === 'TENANG') {
      pertLabel = 'Minggu Tenang';
      desc = 'Minggu tenang sebelum ujian. Gunakan waktu ini untuk review materi.';
    }
    
    if (w.type === 'UTS') {
      pertLabel = 'Pertemuan 8 — UTS';
      desc = 'Ujian Tengah Semester. Jadwal mengikuti pengumuman resmi di SIA.';
    } else if (w.type === 'UAS') {
      pertLabel = 'Pertemuan 16 — UAS';
      desc = 'Ujian Akhir Semester. Jadwal mengikuti pengumuman resmi di SIA.';
    }
    
    return {
      week: weekStr,
      displayWeek: displayWeek,
      tipe: w.type,
      pertemuanKe: w.pKe,
      open: w.open,
      pertemuan: pertLabel,
      desc: desc,
      items: []
    };
  });
}

const TASKTYPE_TO_ACTTYPE = {ASSIGNMENT:'tugas', QUIZ:'quiz', FORUM:'forum'};

const AUTO_COLOR_ABBR = ['AU','BX','CY','DZ','EW','FV','GT','HS'];

function slugifyCourseName(name){
  return 'auto_' + String(name).toLowerCase()
    .replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'').slice(0,40);
}

// Dynamically register course details in COURSES_META and COURSE_WEEKS
function ensureCourseMeta(courseNameRaw, courseNameClean, url, site){
  const id = slugifyCourseName(courseNameRaw);
  if(COURSES_META[id]) return id;

  let cleanName = courseNameClean || cleanCourseNameJS(courseNameRaw);
  cleanName = cleanName.replace(/\r?\n/g, ' ').replace(/^Course Name\s+/i, '').trim();
  
  let name = cleanName, day = '', time = '';
  const m = /^([\s\S]*?)\s*—\s*(\w+)\s+(\d{1,2}:\d{2})$/.exec(cleanName);
  if (m) {
    name = m[1];
    day = m[2];
    time = m[3];
  }

  const dosenMatch = /\(Dosen:\s*([^\)]+)\)/i.exec(courseNameRaw);
  const dosen = dosenMatch ? dosenMatch[1].trim() : '';

  let lmsId = null;
  if (url) {
    const lmsIdMatch = /[?&]id=(\d+)/.exec(url);
    if (lmsIdMatch) {
      lmsId = parseInt(lmsIdMatch[1]);
    }
  }

  let type = 'regular';
  if ((url && url.includes('fast.mercubuana.ac.id')) || (site === 'FAST Learning') || (courseNameRaw && courseNameRaw.includes('FAST'))) {
    type = 'fast';
  }

  COURSES_META[id] = {
    name: name || courseNameRaw,
    abbr: getCourseAbbr(name || courseNameRaw),
    day: day || '-',
    time: time || '-',
    endTime: calculateEndTime(time),
    dosen: dosen || '',
    type: type,
    lmsId: lmsId,
  };

  if (!COURSE_WEEKS[id]) {
    COURSE_WEEKS[id] = generateWeeksForCourse(id);
  }

  return id;
}

// Map tasks from API response to frontend ACTIVITIES array
function mapApiTasksToActivities(tasks){
  return (tasks||[]).map((t,i)=>{
    const courseId = ensureCourseMeta(t.course_name, t.course_clean, t.task_link, t.site);
    return {
      id: `${t.site}-${i}`,
      courseId,
      type: TASKTYPE_TO_ACTTYPE[t.task_type] || 'tugas',
      title: cleanModuleName(t.task_name),
      deadline: t.deadline_iso || null,
      status: t.submitted ? 'done' : 'pending',
      url: t.task_link || '#',
      section_title: t.section_title || null,
      pertemuan_ke: t.pertemuan_ke || null,
      is_previous: t.is_previous || false,
    };
  });
}

function applyScanResult(data){
  COURSES_META = {};
  COURSE_WEEKS = {};
  
  if (data.courses_checked) {
    data.courses_checked.forEach(c => {
      ensureCourseMeta(c.name, null, c.url);
    });
  }

  ACTIVITIES = mapApiTasksToActivities(data.tasks);
  CLASS_MODULES = data.class_modules || [];
  lastRefresh = data.scanned_at ? new Date(data.scanned_at) : new Date();

  // Simpan snapshot hasil scan yang valid ini sebagai cache, supaya kalau nanti
  // status 'busy' macet atau koneksi putus, dashboard tetap bisa menampilkan
  // hasil scan terakhir yang berhasil (bukan kosong).
  try {
    localStorage.setItem('lastGoodScan', JSON.stringify(data));
  } catch (e) {
    console.error('Gagal simpan cache lastGoodScan:', e);
  }
}

function fmtDeadline(iso){

// Forum di LMS tidak memiliki deadline bawaan. Untuk item ACTIVITIES bertipe
// forum, deadline efektifnya dihitung dari akhir rentang "sedang berlangsung"
// pada minggu pertemuan terkait di COURSE_WEEKS (dicocokkan lewat judul),
// bukan dari field deadline statis. Untuk tipe lain (tugas/quiz) deadline
// selalu sudah tersedia dari hasil scan LMS, jadi dipakai apa adanya.
function getEffectiveDeadline(act){
  if(act.type!=='forum') return act.deadline;
  const weeks=COURSE_WEEKS[act.courseId]||[];
  for(const w of weeks){
    const match=(w.items||[]).find(it=>it.type==='forum' && it.label===act.title);
    if(match){
      const range=parseWeekRange(w.week);
      if(range) return range.end.toISOString();
    }
  }
  return act.deadline;
}
// null deadline (tugas tanpa deadline dari hasil scan) diurutkan ke akhir,
// bukan ke awal seperti kalau new Date(null) dianggap epoch 1970.
function sortKeyDeadline(iso){
  if(!iso) return Infinity;
  const t=new Date(iso).getTime();
  return isNaN(t) ? Infinity : t;
}
function bucket(iso){
  if(!iso) return 'safe';
  const diff=(new Date(iso)-new Date())/36e5;
  if(diff<0) return 'late';
  if(diff<72) return 'urgent';
  if(diff<168) return 'soon';
  return 'safe';
}
function countdown(iso){
  if(!iso) return '—';
  const abs=Math.abs(new Date(iso)-new Date());
  const d=Math.floor(abs/864e5), h=Math.floor((abs%864e5)/36e5), m=Math.floor((abs%36e5)/6e4);
  const str=d>0?`${d} hari ${h} jam`:h>0?`${h} jam ${m} menit`:`${m} menit`;
  return (new Date(iso)<new Date()?'Terlambat ':'Sisa ')+str;
}

// Return today's day name in Indonesian
function todayDayName(){
  const days=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  return days[new Date().getDay()];
}

// Is a course currently in session right now?
function isCourseOngoing(meta){
  const now=new Date();
  const todayName=todayDayName();
  if(!meta || meta.day!==todayName) return false;
  if(!meta.time || !meta.endTime || !meta.time.includes(':') || !meta.endTime.includes(':')) return false;
  const [sh,sm]=meta.time.split(':').map(Number);
  const [eh,em]=meta.endTime.split(':').map(Number);
  const startMin=sh*60+sm, endMin=eh*60+em;
  const nowMin=now.getHours()*60+now.getMinutes();
  return nowMin>=startMin && nowMin<endMin;
}

// Is today a class day for this course?
function isTodayCourse(meta){ return meta.day===todayDayName(); }

/* Parse week string like "6 April – 12 April" into Date range.
   We try to extract start/end and add current year */
function parseWeekRange(weekStr, expandSingleDate = true){
  if(!weekStr) return null;
  try{
    const MONTHS = {
      januari: 0, februari: 1, maret: 2, april: 3, mei: 4, juni: 5, juli: 6, agustus: 7, september: 8, oktober: 9, november: 10, desember: 11,
      january: 0, february: 1, march: 2, april: 3, may: 4, june: 5, july: 6, august: 7, september: 8, october: 9, november: 10, december: 11,
      jan: 0, feb: 1, mar: 2, apr: 3, jun: 5, jul: 6, aug: 7, sep: 8, oct: 9, nov: 10, dec: 11
    };
    const getMonthNum = (mStr) => {
      if (!mStr) return 0;
      const clean = mStr.toLowerCase().trim();
      return MONTHS[clean] !== undefined ? MONTHS[clean] : 0;
    };
    const year=new Date().getFullYear();

    // Normalize dashes/hyphens to '|'
    const normalized = weekStr.replace(/[\u2013\u2014-]/g, '|');
    if(!normalized.includes('|')){
      const sp=normalized.trim().split(/\s+/);
      const day=parseInt(sp[0]);
      const month=getMonthNum(sp[1]);
      const start=new Date(year, month, day, 0, 0, 0);
      const end=new Date(start);
      if (expandSingleDate) {
        end.setDate(end.getDate()+6);
      }
      end.setHours(23,59,59,0);
      return {start:start, end:end};
    }

    const parts=normalized.split('|').map(s=>s.trim());
    let startDate,endDate;
    // Try to parse end date first (has full "D Bulan")
    const endParts=parts[1].split(/\s+/);
    const endDay=parseInt(endParts[0]);
    const endMonth=getMonthNum(endParts[1]);
    endDate=new Date(year, endMonth, endDay, 23, 59, 59);

    // Start date
    const startParts=parts[0].split(/\s+/);
    const startDay=parseInt(startParts[0]);
    const startMonth= startParts.length>1 ? getMonthNum(startParts[1]) : endMonth;
    startDate=new Date(year, startMonth, startDay, 0, 0, 0);
    return {start:startDate, end:endDate};
  }catch(e){return null;}
}

function isCurrentWeek(weekStr){
  const range=parseWeekRange(weekStr);
  if(!range) return false;
  const now=new Date();
  return now>=range.start && now<=range.end;
}

let lastRefresh=null;
function updateStatusBar(){
  const dot=document.getElementById('statusDot');
  const txt=document.getElementById('statusText');
  if(!lastRefresh){
    dot.className='dsb-dot';
    txt.innerHTML='<strong>Memuat...</strong>';
    return;
  }
  const now=new Date();
  const ageMin=Math.floor((now-lastRefresh)/60000);
  const timeStr=lastRefresh.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  // Refresh sekarang sengaja jarang (cuma 30 menit sebelum tiap kelas + manual),
  // jadi "stale" cuma ditandai kalau sudah lebih dari 24 jam (kemungkinan tab
  // dibiarkan terbuka berhari-hari), bukan tiap kali jeda beberapa menit.
  const stale=ageMin>=60*24;
  dot.className='dsb-dot'+(stale?' stale':'');

  const ageStr=ageMin===0?'baru saja':ageMin<60?`${ageMin} menit lalu`:`${Math.floor(ageMin/60)} jam lalu`;

  const nextTrig=getNextScheduledTrigger();
  let nextStr='';
  if(nextTrig){
    const sameDay=nextTrig.toDateString()===now.toDateString();
    const timePart=nextTrig.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    nextStr=sameDay
      ? ` · refresh otomatis berikutnya ${timePart}`
      : ` · refresh otomatis berikutnya ${nextTrig.toLocaleDateString('id-ID',{weekday:'short'})} ${timePart}`;
  }

  txt.innerHTML=stale
    ? `<strong>Sudah lama tidak refresh</strong> — terakhir ${timeStr} (${ageStr})${nextStr}`
    : `<strong>Live</strong> — terakhir refresh ${timeStr} · ${ageStr}${nextStr}`;
}

const BLOB_URL = "https://api.npoint.io/f28b0ec35d72c788ab2d";
let apiAvailable = false;
let syncInterval = null;
let isPolling = false;
let busyDetectedAt = null; // waktu pertama kali status 'busy' terdeteksi, untuk staleness check

function updateBackendStatus(isOnline) {
  const badge = document.getElementById('backendStatusBadge');
  const dot = document.getElementById('backendStatusDot');
  const txt = document.getElementById('backendStatusText');
  const btn = document.getElementById('refreshBtn');

  if (!badge || !dot || !txt || !btn) return;

  if (isOnline) {
    badge.style.backgroundColor = 'var(--forest-bg)';
    badge.style.color = 'var(--forest)';
    dot.style.backgroundColor = 'var(--forest)';
    txt.textContent = 'Backend: Online';
    
    if (!btn.classList.contains('spinning')) {
      btn.disabled = false;
    }
  } else {
    badge.style.backgroundColor = 'var(--brick-bg)';
    badge.style.color = 'var(--brick)';
    dot.style.backgroundColor = 'var(--brick)';
    txt.textContent = 'Backend: Offline';
    btn.disabled = true;
  }
}

async function checkBackendConnection() {
  const isLocalHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.port === '5002';
  const localUrl = isLocalHost ? '/api/last-scan' : 'http://localhost:5002/api/last-scan';

  // 1. Coba check local backend dulu
  try {
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), 2000);
    const res = await fetch(localUrl, { method: 'GET', signal: controller.signal });
    clearTimeout(id);
    if (res.ok) {
      apiAvailable = isLocalHost; // tetap relative url jika host local
      updateBackendStatus(true);
      return true;
    }
  } catch (e) {
    // Local check failed
  }

  // 2. Coba check cloud backend status jika remote
  try {
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), 3000);
    const res = await fetch(BLOB_URL + '?t=' + new Date().getTime(), { signal: controller.signal });
    clearTimeout(id);
    if (res.ok) {
      const data = await res.json();
      if (data && data.backend_last_active) {
        const lastActiveTime = new Date(data.backend_last_active);
        const now = new Date();
        const diffSeconds = Math.abs((now - lastActiveTime) / 1000);
        
        // Pengecekan 90 detik aman dari perbedaan jam server-client tipis
        if (diffSeconds < 90) {
          apiAvailable = false;
          updateBackendStatus(true);
          return true;
        }
      }
    }
  } catch (e) {
    // Cloud check failed
  }

  apiAvailable = isLocalHost;
  updateBackendStatus(false);
  return false;
}

function startSyncPolling() {
  if (syncInterval) clearInterval(syncInterval);
  
  const getPollInterval = () => {
    const btn = document.getElementById('refreshBtn');
    const isBusy = btn && btn.classList.contains('spinning');
    return isBusy ? 3000 : 10000;
  };
  
  const runPoll = async () => {
    if (isPolling) return;
    isPolling = true;
    try {
      // Jalankan status checking setiap poll
      const isOnline = await checkBackendConnection();
      
      if (isOnline || !apiAvailable) {
        const url = apiAvailable 
          ? '/api/last-scan?t=' + new Date().getTime()
          : BLOB_URL + '?t=' + new Date().getTime();
          
        const res = await fetch(url);
        if (res.ok) {
          const data = await res.json();
          handleSyncData(data);
        }
      }
    } catch (e) {
      console.error("Sync polling error:", e);
    } finally {
      isPolling = false;
      if (syncInterval) {
        clearInterval(syncInterval);
        syncInterval = setInterval(runPoll, getPollInterval());
      }
    }
  };
  
  syncInterval = setInterval(runPoll, getPollInterval());
}

function handleSyncData(data) {
  const btn = document.getElementById('refreshBtn');
  
  if (data.status === 'busy' || data.request_scan === true) {
    const STALE_MS = 3 * 60 * 1000; // anggap macet jika busy > 3 menit
    const startRef = data.scan_started_at ? new Date(data.scan_started_at) : null;

    if (!busyDetectedAt) busyDetectedAt = startRef || new Date();
    const busyStart = startRef || busyDetectedAt;
    const isStale = (new Date() - busyStart) > STALE_MS;

    if (isStale) {
      // Scan dianggap macet — jangan biarkan status busy menggantung selamanya.
      // Restore tampilan dari cache hasil scan terakhir yang masih valid.
      busyDetectedAt = null;
      let restored = false;
      try {
        const cached = localStorage.getItem('lastGoodScan');
        if (cached) {
          const cachedData = JSON.parse(cached);
          if (cachedData && cachedData.status === 'done' && cachedData.tasks) {
            applyScanResult(cachedData);
            updateStatusBar();
            renderCourseViewsDOM();
            renderDashboard();
            renderSidebar();
            restored = true;
          }
        }
      } catch (e) {
        console.error('Gagal restore cache lastGoodScan:', e);
      }

      if (btn) {
        btn.classList.remove('spinning');
        btn.disabled = false;
      }
      showToast(restored
        ? '⚠ Scan sebelumnya macet, menampilkan data terakhir yang tersimpan'
        : '⚠ Scan sebelumnya macet dan tidak ada data cache tersimpan');
      return;
    }

    if (btn && !btn.classList.contains('spinning')) {
      btn.classList.add('spinning');
      btn.disabled = true;
      showToast('⏳ Terdeteksi scan sedang berjalan di PC Rumah...');
    }
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    if (dot) dot.className = 'dsb-dot';
    if (txt) txt.innerHTML = '<strong>Sedang men-scan tugas...</strong>';
    return;
  }
  
  if (data.status === 'done') {
    busyDetectedAt = null;
    const newScannedAt = data.scanned_at ? new Date(data.scanned_at) : null;
    if (!lastRefresh || (newScannedAt && newScannedAt > lastRefresh)) {
      applyScanResult(data);
      updateStatusBar();
      renderCourseViewsDOM();
      renderDashboard();
      renderSidebar();
      showToast(`✓ Data diperbarui — ${ACTIVITIES.length} tugas ditemukan`);
    }
    
    if (btn && btn.classList.contains('spinning')) {
      btn.classList.remove('spinning');
      btn.disabled = false;
    }
  } else if (data.status === 'error') {
    busyDetectedAt = null;
    if (btn && btn.classList.contains('spinning')) {
      showToast('✗ Scan gagal: ' + (data.error || 'unknown error'));
      btn.classList.remove('spinning');
      btn.disabled = false;
    }
  }
}

async function manualRefresh(){
  const btn=document.getElementById('refreshBtn');

  // Guard tambahan: cegah klik nyelonong lewat kalau tombol memang sudah
  // dikunci (race condition dengan polling / updateBackendStatus).
  if (btn && btn.disabled) return;

  // Cek ulang koneksi secara real-time sebelum benar-benar menjalankan scan.
  // Jangan andalkan status disabled tombol saja — cek langsung ke backend.
  const onlineNow = await checkBackendConnection();
  if (!onlineNow && !apiAvailable) {
    showToast('✗ PC Rumah offline, refresh tidak bisa dilakukan');
    if (btn) {
      btn.disabled = true;
      btn.classList.remove('spinning');
    }
    return;
  }

  if (btn) {
    btn.classList.add('spinning');
    btn.disabled=true;
  }

  if (apiAvailable) {
    showToast('🔄 Scan dijalankan (Lokal) — browser Chrome akan terbuka sebentar...');
    try{
      const res = await fetch('/api/scan', {method:'POST'});
      if(res.status===409){
        showToast('⏳ Scan lain sedang berjalan, coba lagi sebentar.');
        if (btn) {
          btn.classList.remove('spinning');
          btn.disabled=false;
        }
        return;
      }
      if(!res.ok){
        throw new Error(`Server returned HTTP status ${res.status}`);
      }
      
      showToast('⏳ Scan dimulai di PC Rumah. Menunggu hasil...');
      startSyncPolling();
    }catch(err){
      showToast('✗ Gagal menghubungi server: '+err.message);
      if (btn) {
        btn.classList.remove('spinning');
        btn.disabled=false;
      }
    }
  } else {
    showToast('🔄 Mengirim perintah scan ke PC Rumah...');
    try {
      const getRes = await fetch(BLOB_URL + '?t=' + new Date().getTime());
      if (!getRes.ok) throw new Error('Gagal mengambil status Cloud');
      const data = await getRes.json();
      
      data.request_scan = true;
      data.status = 'busy';
      
      const postRes = await fetch(BLOB_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      });
      if (!postRes.ok) throw new Error('Gagal mengirim perintah ke Cloud');
      
      showToast('⏳ Perintah terkirim. Menunggu PC Rumah menjalankan scan...');
      startSyncPolling();
    } catch (err) {
      console.error(err);
      let msg = err.message;
      if (msg === 'Failed to fetch') {
        msg = 'Failed to fetch (Kemungkinan diblokir oleh Adblocker / Brave Shields, atau PC Rumah mati/offline)';
      }
      showToast('✗ Gagal: ' + msg);
      if (btn) {
        btn.classList.remove('spinning');
        btn.disabled=false;
      }
    }
  }
}

  try{
    const url = apiAvailable 
      ? '/api/last-scan?t=' + new Date().getTime()

        showToast(`📂 Memuat data static dari last_scan.json (${ACTIVITIES.length} tugas)`);
      } else {
        throw new Error('Static data status not done');
      }
    }catch(fallbackErr){
      console.error("Gagal memuat scan terakhir:", err, fallbackErr);
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      if (dot) dot.className = 'dsb-dot stale';
      if (txt) txt.innerHTML = '<strong>Gagal memuat data</strong> — periksa internet atau jalankan scan di PC';
    }
  }
}

/* ============================================================
   RENDER SIDEBAR (sorted by day & time)
============================================================ */
function renderSidebar(){
  const container=document.getElementById('sidebarMatkulList');
  const today=todayDayName();

  // Get pending counts
  function pendingCount(cId){
    return ACTIVITIES.filter(a=>a.courseId===cId&&a.status==='pending'&&!a.is_previous).length;
  }

  function renderItem(id){
    const m=COURSES_META[id];
    const cnt=pendingCount(id);
    const ongoing=isCourseOngoing(m);
    const todayClass=isTodayCourse(m);
    let itemClass='sidebar-item';
    if(m.type==='fast') itemClass+=' type-fast';
    if(todayClass && !ongoing) itemClass+=' today-class';

    const metaExtra=ongoing
      ? `<span style="color:#3B3F8C;font-weight:700;"> · Berlangsung</span>`
      : '';

    return `
      <div class="${itemClass}" data-view="course-${id}" data-title="${esc(m.name)}" onclick="switchView('course-${id}',this)">
        <div class="si-icon">${esc(m.abbr)}</div>
        <div class="si-info">
          <div class="si-name">${esc(m.name)}</div>
          <div class="si-meta">${esc(m.day)} · ${esc(m.time)}${metaExtra}</div>
        </div>
        <span class="si-badge${cnt===0?' zero':''}" id="badge-${id}">${cnt}</span>
      </div>
    `;
  }

  let html='';

  // ===== Fast Learning: single section, one course per day, sorted by day =====
  const fastIds=getCourseOrder().filter(id=>COURSES_META[id].type==='fast')
    .sort((a,b)=>(DAY_ORDER[COURSES_META[a].day]||9)-(DAY_ORDER[COURSES_META[b].day]||9));
  if(fastIds.length){
    html+=`<div class="sidebar-section-label">⚡ Fast Learning</div>`;
    fastIds.forEach(id=>{ html+=renderItem(id); });
  }

  // ===== Ruang Kelas: grouped per day, as before =====
  const regularByDay={};
  getCourseOrder().forEach(id=>{
    const m=COURSES_META[id];
    if(m.type==='fast') return;
    if(!regularByDay[m.day]) regularByDay[m.day]=[];
    regularByDay[m.day].push(id);
  });
  const daysSorted=Object.keys(regularByDay).sort((a,b)=>(DAY_ORDER[a]||9)-(DAY_ORDER[b]||9));

  daysSorted.forEach(day=>{
    const isToday=day===today;
    const groupLabel=isToday ? `🏫 Ruang Kelas — ${day} (Hari ini)` : `🏫 Ruang Kelas — ${day}`;

    html+=`<div class="sidebar-section-label">${groupLabel}</div>`;
    if(isToday){
      html+=`<div class="sidebar-day-label today-label">Hari ini</div>`;
    }

    regularByDay[day].forEach(id=>{ html+=renderItem(id); });
  });

  container.innerHTML=html;
}

/* ============================================================
   DYNAMIC WEEKS INTEGRATION
============================================================ */
function getWeeksWithActivities(courseId){
  const staticWeeks = COURSE_WEEKS[courseId] || [];
  // Clone to avoid mutating static definition
  const weeks = staticWeeks.map(w => ({
    ...w,
    items: w.items ? [...w.items] : []
  }));

  const courseActs = ACTIVITIES.filter(a => a.courseId === courseId);

  courseActs.forEach(act => {
    let matchedWeekIndex = -1;

    // 0. Match by pertemuan_ke from backend (explicitly scraped section number)
    if(act.pertemuan_ke != null){
      matchedWeekIndex = weeks.findIndex(w => w.pertemuanKe === act.pertemuan_ke);
    }

    // 1. Match by pertemuan number in title (e.g., "Pertemuan 14", "Pertemuan Ke -14", "P14", "M14", "Minggu ke 14", "pertemuan Minggu ke 14")
    if(matchedWeekIndex === -1){
      let numMatch = /(?:pertemuan\s*(?:minggu\s*)?ke\s*-?\s*|pertemuan\s+|minggu\s*ke\s*|minggu\s+)\s*(\d+)/i.exec(act.title);
      if(!numMatch){
        numMatch = /\b[pm]\s*-?\s*(\d+)\b/i.exec(act.title);
      }
      if(numMatch){
        const pNum = parseInt(numMatch[1]);
        matchedWeekIndex = weeks.findIndex(w => w.pertemuanKe === pNum);
      }
    }

    // 2. Match by section_title string from backend (explicitly scraped section title)
    if(matchedWeekIndex === -1 && act.section_title){
      let numMatch = /(?:pertemuan\s*(?:minggu\s*)?ke\s*-?\s*|pertemuan\s+|minggu\s*ke\s*|minggu\s+)\s*(\d+)/i.exec(act.section_title);
      if(!numMatch){
        numMatch = /\b[pm]\s*-?\s*(\d+)\b/i.exec(act.section_title);
      }
      if(numMatch){
        const pNum = parseInt(numMatch[1]);
        matchedWeekIndex = weeks.findIndex(w => w.pertemuanKe === pNum);
      }
    }

    // 3. Match by date range from section_title
    if (matchedWeekIndex === -1 && act.section_title) {
      const actRange = parseWeekRange(act.section_title, false);
      if (actRange) {
        const midTime = (actRange.start.getTime() + actRange.end.getTime()) / 2;
        matchedWeekIndex = weeks.findIndex(w => {
          const wRange = parseWeekRange(w.week);
          return wRange && midTime >= wRange.start.getTime() && midTime <= wRange.end.getTime();
        });
      }
    }

    // 4. Match by deadline date range
    if(matchedWeekIndex === -1 && act.deadline){
      const actDate = new Date(act.deadline);
      matchedWeekIndex = weeks.findIndex(w => {
        const range = parseWeekRange(w.week);
        return range && actDate >= range.start && actDate <= range.end;
      });
    }

    // 5. Fallback: match by currently ongoing week (since scraper only scans the active week section)
    if(matchedWeekIndex === -1){
      matchedWeekIndex = weeks.findIndex(w => isCurrentWeek(w.week));
    }

    // Add to matched week items
    if(matchedWeekIndex !== -1){
      const week = weeks[matchedWeekIndex];
      const exists = week.items.some(it => it.url === act.url || it.label === act.title);
      if(!exists){
        week.items.push({
          type: act.type,
          label: act.title,
          url: act.url,
          due: act.deadline,
          status: act.status
        });
      }
    }
  });

  // Integrate general modules (meet, attend, pdf, resource, url, etc.)
  const classModuleData = (typeof CLASS_MODULES !== 'undefined') ? CLASS_MODULES.find(cm => slugifyCourseName(cm.course_name) === courseId) : null;
  if (classModuleData && classModuleData.modules) {
    classModuleData.modules.forEach(mod => {
      // First check if this URL is already in any of the week items (to avoid duplicates)
      let alreadyExists = false;
      for (const w of weeks) {
        if (w.items.some(it => it.url === mod.url)) {
          alreadyExists = true;
          break;
        }
      }
      if (alreadyExists) return;

      // Find the matched week for this module using section_title and pertemuan_ke
      let matchedWeekIndex = -1;

      // Match by pertemuan_ke
      if (mod.pertemuan_ke != null) {
        matchedWeekIndex = weeks.findIndex(w => w.pertemuanKe === mod.pertemuan_ke);
      }

      // Match by pertemuan number in name
      if (matchedWeekIndex === -1) {
        const cleanedName = cleanModuleName(mod.name);
        let numMatch = /(?:pertemuan\s*(?:minggu\s*)?ke\s*-?\s*|pertemuan\s+|minggu\s*ke\s*|minggu\s+)\s*(\d+)/i.exec(cleanedName);
        if (!numMatch) {
          numMatch = /\b[pm]\s*-?\s*(\d+)\b/i.exec(cleanedName);
        }
        if (numMatch) {
          const pNum = parseInt(numMatch[1]);
          matchedWeekIndex = weeks.findIndex(w => w.pertemuanKe === pNum);
        }
      }

      // Match by section_title
      if (matchedWeekIndex === -1 && mod.section_title) {
        let numMatch = /(?:pertemuan\s*(?:minggu\s*)?ke\s*-?\s*|pertemuan\s+|minggu\s*ke\s*|minggu\s+)\s*(\d+)/i.exec(mod.section_title);
        if (!numMatch) {
          numMatch = /\b[pm]\s*-?\s*(\d+)\b/i.exec(mod.section_title);
        }
        if (numMatch) {
          const pNum = parseInt(numMatch[1]);
          matchedWeekIndex = weeks.findIndex(w => w.pertemuanKe === pNum);
        }
      }

      // Match by date range from section_title
      if (matchedWeekIndex === -1 && mod.section_title) {
        const range = parseWeekRange(mod.section_title, false);
        if (range) {
          matchedWeekIndex = weeks.findIndex(w => {
            const wRange = parseWeekRange(w.week);
            return wRange && range.start >= wRange.start && range.end <= wRange.end;
          });
        }
      }

      // Add to matched week items
      if (matchedWeekIndex !== -1) {
        const week = weeks[matchedWeekIndex];
        const cleanedLabel = cleanModuleName(mod.name);
        const exists = week.items.some(it => it.url === mod.url || it.label === cleanedLabel);
        if (!exists) {
          week.items.push({
            type: getModuleTypeFromUrl(mod.url, mod.name),
            label: cleanedLabel,
            url: mod.url,
            due: null,
            status: null
          });
        }
      }
    });
  }

  return weeks;
}

/* ============================================================
   RENDER COURSE WEEKS with current-week badges
============================================================ */
function renderCourseWeeks(courseId){
  const weeks=getWeeksWithActivities(courseId);
  const container=document.getElementById('weeks-'+courseId);
  if(!container) return;
  container.innerHTML=weeks.map((w,wi)=>{
    // "Sedang berlangsung" = today falls within this pertemuan's 7-day active
    // range (from its class day through the following week), regardless of
    // which day of the week it is today.
    const ongoing=isCurrentWeek(w.week);
    const hasContent = !!(w.pertemuan || w.desc || (w.items && w.items.length));

    let blockClass='week-block';
    if(ongoing || hasContent) blockClass+=' open';
    if(ongoing) blockClass+=' is-ongoing';

    let badge='';
    if(ongoing) badge=`<span class="week-status-badge wsb-ongoing">⚡ Sedang berlangsung</span>`;

    // Nomor pertemuan ke-berapa, diambil dari kalender resmi (acuan: PDF kalender
    // perkuliahan hybrid, kolom hari sesuai jadwal matkul ini).
    const pertLabel = (w.pertemuanKe!=null) ? `<span class="week-pertemuan-no">P${esc(String(w.pertemuanKe))}</span>` : (w.tipe==='LIBUR' ? `<span class="week-pertemuan-no">Libur</span>` : (w.tipe==='TENANG' ? `<span class="week-pertemuan-no">Tenang</span>` : ''));
    const tipeBadge = w.tipe ? `<span class="week-tipe-badge wt-${esc(w.tipe)}">${esc(w.tipe)}</span>` : '';

    // Forum di LMS tidak memiliki deadline bawaan, jadi kita hitung sendiri:
    // batas akhir mengerjakan forum = akhir rentang "sedang berlangsung" pada
    // minggu pertemuan itu (untuk Sabtu ini otomatis ikut aturan +7 hari dari
    // tanggal pertemuan, karena dihitung lewat parseWeekRange yang sama).
    const weekRange = parseWeekRange(w.week);
    const itemsWithForumDeadline = (w.items||[]).map(it=>{
      if(it.type==='forum' && weekRange){
        return {...it, due: weekRange.end.toISOString()};
      }
      return it;
    });

    return `
    <div class="${blockClass}" id="wb-${courseId}-${wi}">
      <div class="week-header" onclick="toggleWeek('${courseId}',${wi})">
        <span class="week-label">${esc(w.displayWeek || w.week)}</span>
        ${tipeBadge}
        ${pertLabel}
        ${badge}
        <svg class="week-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="week-body">
        ${w.pertemuan?`<div class="pertemuan-title">${esc(w.pertemuan)}</div>`:''}
        ${w.desc?`<div class="pertemuan-desc">${esc(w.desc)}</div>`:''}
        ${itemsWithForumDeadline.length?`<div class="activity-list">${itemsWithForumDeadline.map(it=>renderActivityItem(it)).join('')}</div>`:''}
        ${(!w.pertemuan&&!w.items.length)?`<div style="color:var(--ink-soft);font-size:13px;padding:4px 0;">Tidak ada materi pada minggu ini.</div>`:''}
      </div>
    </div>`;
  }).join('');
}

   RENDER DASHBOARD

let dashSortMode='waktu'; // 'waktu' | 'matkul'

function setDashSort(mode){
  dashSortMode=mode;
  document.getElementById('sortByTime').classList.toggle('active', mode==='waktu');
  document.getElementById('sortByMatkul').classList.toggle('active', mode==='matkul');
  renderDashboard();

function renderDashboard(){
  const pending=ACTIVITIES.filter(a=>a.status==='pending' && !a.is_previous);
  const late=pending.filter(a=>bucket(getEffectiveDeadline(a))==='late').length;
  const done=ACTIVITIES.filter(a=>a.status==='done' && !a.is_previous);
  document.getElementById('dashGrid').innerHTML=`
    <div class="dash-card">
      <div class="dc-label">Total Tugas &mdash; ${pending.length + done.length}</div>
      <div class="dc-value c-brick">${pending.length}</div>
      <div class="dc-value-label">belum dikerjakan</div>
      <div class="dc-sub">
        <span class="dc-sub-num">${done.length}</span>
        <span class="dc-sub-text">sudah dikerjakan</span>
      </div>
    </div>
  `;

  const sorted=pending.slice().sort((a,b)=>sortKeyDeadline(getEffectiveDeadline(a))-sortKeyDeadline(getEffectiveDeadline(b)));
  document.getElementById('dashCount').textContent=`${sorted.length} aktivitas`;

  const rekapEl=document.getElementById('dashRekap');

  function renderTaskCard(act,i){
    const c=COURSES_META[act.courseId];
    const effDeadline=getEffectiveDeadline(act);
    const bk=bucket(effDeadline);
    return `<div class="task-card s-${bk}" style="animation-delay:${i*0.04}s">
      <div class="status-ladder"></div>
      <div class="task-main">
        <div class="task-top-row">
          <span class="badge type-${act.type}">${typeBadge(act.type)}</span>
          <span class="badge status-${bk}">${statusBadge(bk)}</span>
        </div>
        <div class="task-course">${esc(c.name)}</div>
        <div class="task-schedule">${c.day}, ${c.time}</div>
        <div class="task-title">${esc(act.title)}</div>
        <div class="task-deadline-row">
          <span class="task-deadline">Deadline: ${fmtDeadline(effDeadline)}</span>
          <span class="task-countdown">${countdown(effDeadline)}</span>
        </div>
      </div>
      <div class="task-action">
        <a class="btn-open" href="${act.url}" target="_blank">Buka Tugas
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M7 7h10v10"/></svg>
        </a>
      </div>
    </div>`;
  }

  if(dashSortMode==='matkul'){
    // Group pending tasks by course, ordered by COURSE_ORDER (day & time), each group's tasks sorted by deadline
    const byCourse={};
    sorted.forEach(act=>{ (byCourse[act.courseId]=byCourse[act.courseId]||[]).push(act); });
    const courseIds=getCourseOrder().filter(id=>byCourse[id] && byCourse[id].length);

    rekapEl.innerHTML=courseIds.map(cId=>{
      const c=COURSES_META[cId];
      const items=byCourse[cId];
      return `
      <div class="rekap-groups" style="margin-bottom:0;">
        <div class="matkul-group-head">
          <span class="rekap-day-pill" style="background:var(--forest-bg);color:var(--forest);">${esc(c.abbr)}</span>
          <span class="matkul-group-name">${esc(c.name)}</span>
          <div class="matkul-group-meta">
            <span class="matkul-group-sched">${esc(c.day)} · ${esc(c.time)}</span>
            <div class="rekap-group-line"></div>
            <span class="matkul-group-count">${items.length} item</span>
          </div>
        </div>
        <div class="task-list">
          ${items.map((act,i)=>renderTaskCard(act,i)).join('')}
        </div>
      </div>`;
    }).join('');

    if(!courseIds.length){
      rekapEl.innerHTML=`<div class="rekap-empty">🎉 Tidak ada aktivitas pending.</div>`;
    }
  } else {
    // Group by time bracket
    const now=new Date();
    const todayStart=new Date(now); todayStart.setHours(0,0,0,0);
    const todayEnd=new Date(now); todayEnd.setHours(23,59,59,999);
    const tomorrowStart=new Date(todayStart); tomorrowStart.setDate(tomorrowStart.getDate()+1);
    const tomorrowEnd=new Date(todayEnd); tomorrowEnd.setDate(tomorrowEnd.getDate()+1);
    const weekEnd=new Date(todayStart); weekEnd.setDate(weekEnd.getDate()+7);
    const nextWeekEnd=new Date(todayStart); nextWeekEnd.setDate(nextWeekEnd.getDate()+14);

    const groups=[
      {key:'terlambat', pill:'rdp-today', title:'Terlambat', items:[]},
      {key:'hari-ini',  pill:'rdp-today', title:'Deadline Hari Ini', items:[]},
      {key:'besok',     pill:'rdp-tomorrow', title:'Besok', items:[]},
      {key:'minggu-ini',pill:'rdp-week', title:'Minggu Ini (7 hari ke depan)', items:[]},
      {key:'berikutnya',pill:'rdp-next', title:'Lebih dari 7 Hari', items:[]},
      {key:'tanpa-deadline',pill:'rdp-next', title:'Tanpa Deadline', items:[]},
    ];

    sorted.forEach(act=>{
      const eff=getEffectiveDeadline(act);
      if(!eff){ groups[5].items.push(act); return; }
      const d=new Date(eff);
      if(d<now)              groups[0].items.push(act);
      else if(d<=todayEnd)   groups[1].items.push(act);
      else if(d<=tomorrowEnd)groups[2].items.push(act);
      else if(d<=weekEnd)    groups[3].items.push(act);
      else                   groups[4].items.push(act);
    });

    rekapEl.innerHTML=groups.filter(g=>g.items.length).map(g=>`
      <div class="rekap-groups" style="margin-bottom:0;">
        <div class="rekap-group-head">
          <span class="rekap-day-pill ${g.pill}">${g.key==='terlambat'?'⚠ ':''} ${esc(g.title)}</span>
          <div class="rekap-group-line"></div>
          <span style="font-family:JetBrains Mono,monospace;font-size:11px;color:var(--ink-soft);flex-shrink:0;">${g.items.length} item</span>
        </div>
        <div class="task-list">
          ${g.items.map((act,i)=>renderTaskCard(act,i)).join('')}
        </div>
      </div>
    `).join('');

    if(!groups.some(g=>g.items.length)){
      rekapEl.innerHTML=`<div class="rekap-empty">🎉 Tidak ada aktivitas pending.</div>`;
    }
  }

  // ===== Rekap matkul tanpa tugas pending =====
  const courseIdsWithPending=new Set(pending.map(a=>a.courseId));
  const coursesWithoutTask=getCourseOrder().filter(id=>!courseIdsWithPending.has(id));
  const noTaskEl=document.getElementById('dashNoTask');
  document.getElementById('dashNoTaskCount').textContent=`${coursesWithoutTask.length} matkul`;
  noTaskEl.innerHTML=coursesWithoutTask.length
    ? coursesWithoutTask.map(id=>{
        const c=COURSES_META[id];
        return `<div class="notask-chip">
          <div class="notask-icon">${esc(c.abbr)}</div>
          <div class="notask-info">
            <div class="notask-name">${esc(c.name)}</div>
            <div class="notask-sched">${esc(c.day)} · ${esc(c.time)}</div>
          </div>
          <div class="notask-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
        </div>`;
      }).join('')
    : `<div class="rekap-empty">Semua mata kuliah masih punya tugas pending.</div>`;

  // ===== Rekap tugas sudah dikerjakan =====
  const doneSorted=done.slice().sort((a,b)=>sortKeyDeadline(getEffectiveDeadline(b))-sortKeyDeadline(getEffectiveDeadline(a)));
  const doneEl=document.getElementById('dashDone');
  document.getElementById('dashDoneCount').textContent=`${doneSorted.length} tugas`;
  doneEl.innerHTML=doneSorted.length
    ? doneSorted.map(act=>{
        const c=COURSES_META[act.courseId];
        return `<div class="done-card" onclick="openDoneModal('${act.id}')">
          <div class="done-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <div class="done-info">
            <div class="done-course">${esc(c.abbr)} · ${esc(c.name)}</div>
            <div class="done-title">${esc(act.title)}</div>
          </div>
          <div class="done-chevron">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
          </div>
        </div>`;
      }).join('')
    : `<div class="rekap-empty">Belum ada tugas yang ditandai selesai.</div>`;

  // Update status bar
  updateStatusBar();
}

/* ============================================================
   INTERACTIONS
============================================================ */
function toggleWeek(courseId, idx){
  const block=document.getElementById(`wb-${courseId}-${idx}`);
  block.classList.toggle('open');
}
function openActivity(el){
  const url = el.getAttribute('data-url');
  const label = el.getAttribute('data-label');
  if(url && url!=='#') window.open(url,'_blank');
  else showToast(`📋 ${label} — URL LMS belum terhubung`);
}

function openDoneModal(actId){
  const act=ACTIVITIES.find(a=>a.id===actId);
  if(!act) return;
  const c=COURSES_META[act.courseId];
  document.getElementById('doneModalTitle').textContent=act.title;
  document.getElementById('doneModalCourse').textContent=`${c.abbr} · ${c.name}`;
  document.getElementById('doneModalSchedule').textContent=`${c.day}, ${c.time}`;
  document.getElementById('doneModalType').textContent=typeBadge(act.type);
  document.getElementById('doneModalDeadline').textContent=fmtDeadline(getEffectiveDeadline(act));
  const openBtn=document.getElementById('doneModalOpenBtn');
  if(act.url && act.url!=='#'){
    openBtn.href=act.url;
    openBtn.onclick=null;
    openBtn.style.opacity='1';
    openBtn.style.pointerEvents='auto';
  } else {
    openBtn.href='#';
    openBtn.onclick=(e)=>{ e.preventDefault(); showToast('📋 URL LMS belum terhubung'); };
  }
  document.getElementById('doneModalOverlay').classList.add('open');
}
function closeDoneModal(){
  document.getElementById('doneModalOverlay').classList.remove('open');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeDoneModal();
});

let currentView='dashboard';
function switchView(viewId, el, title){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(s=>s.classList.remove('active'));
  document.getElementById('view-'+viewId).classList.add('active');
  el.classList.add('active');
  const viewTitle = title || el.getAttribute('data-title') || 'Dashboard';
  document.getElementById('topbarBreadcrumb').innerHTML =
    viewId==='dashboard'
    ? 'Dashboard <span>›</span> Overview'
    : `Dashboard <span>›</span> ${esc(viewTitle)}`;
  currentView=viewId;
  if(viewId.startsWith('course-')){
    const cId=viewId.replace('course-','');
    renderCourseWeeks(cId);
  }
  if(window.innerWidth<=720) closeSidebar();
  // Instant jump to top first (no animation) so it never races with the
  // smooth scroll-to-ongoing-week below — html has scroll-behavior:smooth
  // globally, so a plain scrollTo(0,0) would otherwise also animate and
  // could "win" over the later scroll, landing back at the top.
  window.scrollTo({top:0, left:0, behavior:'instant'});
  if(viewId.startsWith('course-')){
    scrollToOngoingWeek(viewId.replace('course-',''));
  }
}

function scrollToOngoingWeek(courseId){
  requestAnimationFrame(()=>{
    const container=document.getElementById('weeks-'+courseId);
    if(!container) return;
    const target=container.querySelector('.week-block.is-ongoing');
    if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
  });
}

function toggleSidebar(){
  const s=document.getElementById('sidebar');
  const o=document.getElementById('sidebarOverlay');
  s.classList.toggle('open');
  o.classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

/* ============================================================
   CLOCK & SCHEDULED AUTO-REFRESH
   Refresh otomatis HANYA dipicu 30 menit sebelum jam tiap matkul
   (sesuai jadwal di COURSES_META), supaya tidak terlalu sering
   "ngepoll" terus-menerus (hindari pola seperti bot). Selain itu,
   refresh juga terjadi saat tombol refresh manual dipencet.
============================================================ */
function tickClock(){
  const now=new Date();
  document.getElementById('topbarClock').textContent=
    now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
}
tickClock();
setInterval(tickClock,1000);

// Ini BUKAN refresh data — cuma update teks "X menit lalu" & re-render
// list dari data yang sudah ada di memori (lokal, tidak ada panggilan
// jaringan), supaya pengelompokan deadline (terlambat/hari ini/dst) tetap
// akurat seiring waktu berjalan.
setInterval(()=>{
  updateStatusBar();
  if(currentView==='dashboard') renderDashboard();
}, 60000);

const DAY_INDEX={Minggu:0,Senin:1,Selasa:2,Rabu:3,Kamis:4,Jumat:5,Sabtu:6};

// Hitung jadwal kelas berikutnya (occurrence terdekat di masa depan)
// untuk tiap matkul, beserta waktu trigger-nya (30 menit sebelum mulai).
function getNextClassTriggerTimes(){
  const now=new Date();
  return Object.keys(COURSES_META).map(id=>{
    const c=COURSES_META[id];
    const targetDay=DAY_INDEX[c.day];
    const [h,m]=c.time.split(':').map(Number);
    let d=new Date(now);
    d.setHours(h,m,0,0);
    const diff=(targetDay-d.getDay()+7)%7;
    d.setDate(d.getDate()+diff);
    if(d<=now) d.setDate(d.getDate()+7); // sudah lewat, ambil minggu depan
    const triggerTime=new Date(d.getTime()-30*60000);
    return {courseId:id, classTime:d, triggerTime};
  });
}

function getNextScheduledTrigger(){
  const now=new Date();
  const upcoming=getNextClassTriggerTimes().map(t=>t.triggerTime).filter(t=>t>now);
  return upcoming.length ? upcoming.reduce((a,b)=>a<b?a:b) : null;
}

// Lacak trigger yang sudah dieksekusi (per occurrence kelas) supaya tidak
// refresh berkali-kali di dalam window 30-menit yang sama.
const scheduledRefreshDone=new Set();

function checkScheduledRefresh(){
  const now=new Date();
  getNextClassTriggerTimes().forEach(({courseId,classTime,triggerTime})=>{
    const key=courseId+'|'+classTime.toISOString();
    if(now>=triggerTime && now<classTime && !scheduledRefreshDone.has(key)){
      scheduledRefreshDone.add(key);
      lastRefresh=new Date();
      renderDashboard();
      renderSidebar();
      updateStatusBar();
      const c=COURSES_META[courseId];
      showToast(`🔄 Auto-refresh — ${c.abbr} mulai 30 menit lagi`);
    }
  });
}
// Cek tiap menit apakah sudah masuk window 30-menit-sebelum-kelas manapun.
// Pengecekan ini ringan & lokal (cuma bandingin jam), bukan hit ke server.
setInterval(checkScheduledRefresh, 60000);
checkScheduledRefresh();

/* ============================================================
   INIT
============================================================ */
async function initApp() {
  // Load cache hasil scan terakhir yang valid (kalau ada) LEBIH DULU,
  // sebelum fetch ke network — supaya dashboard tidak kelihatan kosong
  // saat menunggu hasil status/scan terbaru datang.
  try {
    const cached = localStorage.getItem('lastGoodScan');
    if (cached) {
      const cachedData = JSON.parse(cached);
      if (cachedData && cachedData.status === 'done' && cachedData.tasks) {
        applyScanResult(cachedData);
      }
    }
  } catch (e) {
    console.error('Gagal load cache lastGoodScan:', e);
  }

  renderCourseViewsDOM();
  renderSidebar();
  renderDashboard();
  updateStatusBar();
  
  await checkBackendConnection();
  await loadLastScan();
  startSyncPolling();
}
initApp();
</script>
